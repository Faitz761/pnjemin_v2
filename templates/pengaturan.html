{% extends 'base.html' %}
{% block title %}Pengaturan - P-Njemin{% endblock %}
{% block content %}
<div style="max-width:520px;margin:0 auto;padding:1.5rem">
    <div class="page-header">
        <h1><i class="fas fa-cog" style="color:var(--primary)"></i> Pengaturan</h1>
    </div>

    <!-- GANTI PASSWORD -->
    <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><i class="fas fa-lock" style="color:var(--primary)"></i> Ubah Password</div>
        <div class="card-body">
            <form method="post">
                <div class="form-group">
                    <label>Password Lama</label>
                    <input type="password" name="password_lama" class="form-control" placeholder="Password saat ini" required>
                </div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" name="password_baru" class="form-control" placeholder="Min. 6 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password Baru</label>
                    <input type="password" name="password_konfirm" class="form-control" placeholder="Ulangi password baru" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
                    <i class="fas fa-save"></i> Simpan Password Baru
                </button>
            </form>
        </div>
    </div>

    <!-- MENU LAINNYA -->
    <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><i class="fas fa-info-circle" style="color:var(--primary)"></i> Lainnya</div>
        <div class="card-body" style="padding:0">
            <a href="{{ url_for('edit_profil') }}" style="display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:0.9rem;font-weight:600">
                <i class="fas fa-user-edit" style="color:var(--primary);width:20px"></i> Edit Profil
                <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:0.8rem"></i>
            </a>
            <a href="{{ url_for('profil') }}" style="display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:0.9rem;font-weight:600">
                <i class="fas fa-bell" style="color:var(--primary);width:20px"></i> Notifikasi
                <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:0.8rem"></i>
            </a>
            <a href="{{ url_for('tentang') }}" style="display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:0.9rem;font-weight:600">
                <i class="fas fa-info-circle" style="color:var(--primary);width:20px"></i> Tentang P-Njemin
                <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:0.8rem"></i>
            </a>
            <a href="{{ url_for('bantuan') }}" style="display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);font-size:0.9rem;font-weight:600">
                <i class="fas fa-question-circle" style="color:var(--primary);width:20px"></i> Pusat Bantuan & FAQ
                <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:0.8rem"></i>
            </a>
            <div style="padding:0.9rem 1.2rem;font-size:0.82rem;color:var(--text-muted)">
                <i class="fas fa-shield-alt" style="width:20px"></i> Versi P-Njemin 1.0 &mdash; Platform Peminjaman Barang
            </div>
        </div>
    </div>

    <a href="{{ url_for('logout') }}" class="btn btn-danger" style="width:100%;justify-content:center">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>
{% endblock %}
