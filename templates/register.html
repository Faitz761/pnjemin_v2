{% extends 'base.html' %}
{% block title %}Daftar - P-Njemin{% endblock %}
{% block extra_css %}
<style>
.alamat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
}
.alamat-grid select {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
}
.alamat-grid select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.auth-wrap { min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.auth-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); width: 100%; max-width: 480px; overflow: hidden; }
.auth-header { background: linear-gradient(135deg, var(--secondary), #16213e); padding: 1.8rem; text-align: center; }
.auth-header h2 { font-family: 'Syne', sans-serif; color: white; font-size: 1.4rem; margin-bottom: 0.3rem; }
.auth-header p { color: rgba(255,255,255,0.55); font-size: 0.85rem; }
.auth-logo { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--primary); margin-bottom: 0.8rem; }
.auth-body { padding: 1.8rem; }
.auth-footer { text-align: center; font-size: 0.85rem; color: var(--text-muted); padding-bottom: 1.5rem; }
.auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
.tipe-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
.tipe-option { position: relative; }
.tipe-option input[type=radio] { position: absolute; opacity: 0; }
.tipe-label {
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    padding: 0.9rem; border: 2px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; text-align: center; transition: all 0.2s; font-size: 0.85rem; font-weight: 600;
}
.tipe-label i { font-size: 1.5rem; color: var(--text-muted); }
.tipe-option input:checked + .tipe-label { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.tipe-option input:checked + .tipe-label i { color: var(--primary); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">P-Njemin</div>
            <h2>Buat Akun Baru</h2>
            <p>Bergabung dan mulai pinjemin barang</p>
        </div>
        <div class="auth-body">
            <form method="post">
                <div class="form-group">
                    <label>Saya ingin bergabung sebagai:</label>
                    <div class="tipe-selector">
                        <div class="tipe-option">
                            <input type="radio" name="tipe_akun" id="tipe_peminjam" value="peminjam" checked>
                            <label class="tipe-label" for="tipe_peminjam">
                                <i class="fas fa-hand-holding"></i>
                                Peminjam
                                <small style="font-weight:400;color:var(--text-muted)">Cari & pinjam barang</small>
                            </label>
                        </div>
                        <div class="tipe-option">
                            <input type="radio" name="tipe_akun" id="tipe_pemilik" value="pemilik">
                            <label class="tipe-label" for="tipe_pemilik">
                                <i class="fas fa-store"></i>
                                Pemilik Barang
                                <small style="font-weight:400;color:var(--text-muted)">Sewakan barangmu</small>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" name="nama" class="form-control" placeholder="Nama lengkap kamu" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@kamu.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Nomor HP</label>
                    <input type="text" name="no_hp" class="form-control" placeholder="08xxxxxxxxxx" required>
                </div>
                <div class="form-group">
    <label><i class="fas fa-id-card"></i> NIK (Sementara opsional untuk tugas!)</label>
    <input type="text" name="nik" class="form-control" placeholder="16 digit NIK" required maxlength="16">
</div>
                <div class="form-group">
    <label>Alamat</label>
    <div class="alamat-grid">
        <select id="provinsi" onchange="loadKabupaten()" required>
            <option value="">— Pilih Provinsi —</option>
        </select>
        <select id="kabupaten" onchange="loadKecamatan()" disabled required>
            <option value="">— Pilih Kabupaten —</option>
        </select>
        <select id="kecamatan" onchange="loadDesa()" disabled required>
            <option value="">— Pilih Kecamatan —</option>
        </select>
        <select id="desa" disabled required>
            <option value="">— Pilih Desa —</option>
        </select>
    </div>
    <label style="font-size:0.85rem;color:var(--text-muted);margin-top:0.75rem;display:block">Detail alamat tambahan (opsional)</label>
    <textarea name="alamat" id="alamat_detail" rows="2" placeholder="nomor rumah, RT/RW, patokan, atau paste alamat lengkap dari Google Maps di sini" style="width:100%;margin-top:0.15rem;padding:0.6rem 0.75rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:0.95rem;resize:none"></textarea>
    <!-- Field hidden untuk kirim alamat lengkap -->
    <input type="hidden" name="alamat" id="alamat_lengkap">
</div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
<div style="position: relative;">
    <input type="password" name="password" id="password" class="form-control" placeholder="Password kamu" required style="padding-right: 40px;">
    <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
</div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
            </form>
        </div>
        <div class="auth-footer">
            Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
        </div>
    </div>
</div>
<script>
    //JS alamat
    const BASE = 'https://www.emsifa.com/api-wilayah-indonesia/api';

async function fetchWilayah(url) {
    const res = await fetch(url);
    return res.json();
}

function isiSelect(el, data, keyId, keyNama, placeholder) {
    el.innerHTML = `<option value="">${placeholder}</option>`;
    data.forEach(d => {
        el.innerHTML += `<option value="${d[keyId]}" data-nama="${d[keyNama]}">${d[keyNama]}</option>`;
    });
    el.disabled = false;
}

function resetSelect(el, placeholder) {
    el.innerHTML = `<option value="">${placeholder}</option>`;
    el.disabled = true;
}

function updateAlamatLengkap() {
    const parts = ['provinsi','kabupaten','kecamatan','desa']
        .map(id => {
            const el = document.getElementById(id);
            const opt = el.options[el.selectedIndex];
            return opt && opt.dataset.nama ? opt.dataset.nama : '';
        })
        .filter(Boolean);
    const detail = document.getElementById('alamat_detail').value.trim();
    if (detail) parts.push(detail);
    document.getElementById('alamat_lengkap').value = parts.join(', ');
}

async function loadProvinsi() {
    const data = await fetchWilayah(`${BASE}/provinces.json`);
    isiSelect(document.getElementById('provinsi'), data, 'id', 'name', '— Pilih Provinsi —');
}

async function loadKabupaten() {
    const prov = document.getElementById('provinsi');
    updateAlamatLengkap();
    resetSelect(document.getElementById('kabupaten'), '— Pilih Kabupaten —');
    resetSelect(document.getElementById('kecamatan'), '— Pilih Kecamatan —');
    resetSelect(document.getElementById('desa'), '— Pilih Desa —');
    if (!prov.value) return;
    const data = await fetchWilayah(`${BASE}/regencies/${prov.value}.json`);
    isiSelect(document.getElementById('kabupaten'), data, 'id', 'name', '— Pilih Kabupaten —');
}

async function loadKecamatan() {
    const kab = document.getElementById('kabupaten');
    updateAlamatLengkap();
    resetSelect(document.getElementById('kecamatan'), '— Pilih Kecamatan —');
    resetSelect(document.getElementById('desa'), '— Pilih Desa —');
    if (!kab.value) return;
    const data = await fetchWilayah(`${BASE}/districts/${kab.value}.json`);
    isiSelect(document.getElementById('kecamatan'), data, 'id', 'name', '— Pilih Kecamatan —');
}

async function loadDesa() {
    const kec = document.getElementById('kecamatan');
    updateAlamatLengkap();
    resetSelect(document.getElementById('desa'), '— Pilih Desa —');
    if (!kec.value) return;
    const data = await fetchWilayah(`${BASE}/villages/${kec.value}.json`);
    isiSelect(document.getElementById('desa'), data, 'id', 'name', '— Pilih Desa —');
}

// Update alamat lengkap saat desa dipilih atau detail diketik
document.getElementById('desa').addEventListener('change', updateAlamatLengkap);
document.getElementById('alamat_detail').addEventListener('input', updateAlamatLengkap);

// Load provinsi saat halaman dibuka
loadProvinsi();

//JS Password
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
