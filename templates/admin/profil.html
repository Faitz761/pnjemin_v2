{% extends 'admin/base.html' %}
{% block title %}Profil Admin - P-Njemin{% endblock %}
{% block content %}
<div class="topbar">
    <h1><i class="fas fa-user-shield" style="color:var(--primary)"></i> Profil Admin</h1>
</div>
<div style="max-width:500px">
    <div class="card" style="margin-bottom:1rem">
        <div class="card-header">Informasi Akun</div>
        <div class="card-body">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)">
                <div style="width:56px;height:56px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700">
                    {{ user.nama[0].upper() }}
                </div>
                <div>
                    <div style="font-weight:800;font-size:1rem">{{ user.nama }}</div>
                    <div style="font-size:0.82rem;color:var(--text-muted)">{{ user.email }}</div>
                    <span class="badge badge-warning" style="margin-top:0.3rem">Admin</span>
                </div>
            </div>
            <form method="post">
                <input type="hidden" name="aksi" value="edit">
                <div class="form-group">
                    <label>Nama Admin</label>
                    <input type="text" name="nama" class="form-control" value="{{ user.nama }}" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Simpan</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Ubah Password</div>
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="aksi" value="password">
                <div class="form-group">
                    <label>Password Lama</label>
                    <input type="password" name="password_lama" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password Baru</label>
                    <input type="password" name="password_baru" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-lock"></i> Ubah Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
